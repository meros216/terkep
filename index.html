<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Építészeti Látványterv - Javított</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    // --- 1. TOKEN ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/meros2216/cmm50exbk00ac01r6fn6c8rd2', // Az árnyékos stílus
        center: [19.877, 47.486],
        zoom: 16.5,
        pitch: 65,
        bearing: 30,
        antialias: true
    });

    map.on('style.load', () => {

        // A. BEÁLLÍTÁSOK (Feliratok ki, Árnyék be)
        map.setConfig('basemap', {
            'showPointOfInterestLabels': false,
            'showTransitLabels': false,
            'showRoadLabels': false,
            'showPlaceLabels': false,
            'lightPreset': 'dawn' // Hajnali fények = Hosszú árnyékok!
        });

        // B. KÖD ELTÜNTETÉSE
        map.setFog(null);

        // C. FÁK BETÖLTÉSE
        map.addModel('sajat-fa-modell', './fa.glb');

        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            // --- EZ HIÁNYZOTT! ---
            // Ez mondja meg a Standard stílusnak, hogy hova tegye a fákat:
            'slot': 'middle', 
            // ---------------------
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                'model-scale': [0.005, 0.005, 0.005], // Maradt a nagy méret
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0]
            }
        });
    });
</script>
</body>
</html>
