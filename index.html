<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Végleges Monokróm Térkép</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    // --- 1. TOKEN ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', // A színezhető alap
        center: [19.877, 47.486],
        zoom: 16,
        pitch: 62,      // Kicsit jobban megdöntve a drámai hatásért
        bearing: 30,
        antialias: true
    });

    map.on('style.load', () => {

        // ============================================================
        // A. FÉNYEK ÉS ÁRNYÉKOK BEÁLLÍTÁSA (FONTOS!)
        // ============================================================
        // Ezzel verjük át a rendszert: beállítunk egy irányított fényt,
        // amitől a házak egyik oldala világos, a másik sötét lesz.
        map.setLight({
            'anchor': 'viewport', // A fény mozog a kamerával
            'color': '#ffffff',   // Fehér napfény
            'intensity': 0.6,     // Fényerősség
            'position': [1.5, 90, 80] // A fény iránya (innen süssön a nap)
        });

        // ============================================================
        // B. SZÍNEZÉS
        // ============================================================

        // 1. VÍZ (Tavak)
        if (map.getLayer('water')) {
            map.setPaintProperty('water', 'fill-color', '#a3e0ff');
        }
        // 2. FOLYÓK (Zagyva, patakok) - Vonalak színezése
        if (map.getLayer('waterway')) {
            map.setPaintProperty('waterway', 'line-color', '#a3e0ff');
            map.setPaintProperty('waterway', 'line-width', 6); // Legyen kicsit vastagabb
        }

        // 3. ZÖLD TERÜLETEK (Szürkére, hogy ne üssön el)
        const landLayers = ['landuse', 'landcover', 'national-park'];
        for (const layer of landLayers) {
            if (map.getLayer(layer)) {
                map.setPaintProperty(layer, 'fill-color', '#d0d0d0'); 
                map.setPaintProperty(layer, 'fill-opacity', 0.5);
            }
        }

        // 4. UTAK (Fehérre)
        const layers = map.getStyle().layers;
        for (const layer of layers) {
            if (layer.id.indexOf('road') >= 0 && layer.type === 'line') {
                map.setPaintProperty(layer.id, 'line-color', '#ffffff');
            }
        }

        // ============================================================
        // C. 3D ÉPÜLETEK
        // ============================================================
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 14,
            'paint': {
                'fill-extrusion-color': '#bbbbbb', // Épület színe
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-base': ['get', 'min_height'],
                'fill-extrusion-opacity': 0.95
            }
        });

        // ============================================================
        // D. FÁK
        // ============================================================
        map.addModel('sajat-fa-modell', './fa.glb');

        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                'model-scale': [6, 6, 6],
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0]
                // Mivel már szép fát töltesz le, a színezést kivettem!
            }
        });
    });
</script>
</body>
</html>
