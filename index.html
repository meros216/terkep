<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Monokróm Erdő Kék Vízzel</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    // --- 1. LÉPÉS: A TOKENED ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', // Alap szürke térkép
        center: [19.877, 47.486],
        zoom: 16,
        pitch: 60,
        bearing: 30,
        antialias: true
    });

    map.on('style.load', () => {
        
        // --- 2. LÉPÉS: VÍZ SZÍNEZÉSE ---
        if (map.getLayer('water')) {
            map.setPaintProperty('water', 'fill-color', '#a3e0ff'); // KÉK
        }

        // --- 3. LÉPÉS: FÁK BETÖLTÉSE ÉS ÁTSZÍNEZÉSE ---
        map.addModel('sajat-fa-modell', './fa.glb');

        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                'model-scale': [8, 8, 8],
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0],

                // --- ITT TÖRTÉNIK A VARÁZSLAT! ---
                // Ez a sor mondja meg, milyen színű legyen a fa:
                'model-color': '#808080', // Középszürke (írhatsz 'white'-ot vagy 'black'-et is)
                
                // Ez a sor mondja meg, mennyire fedje el az eredeti színt:
                // 0 = eredeti zöld, 1 = teljesen szürke
                'model-color-mix-intensity': 1 
            }
        });
    });
</script>
</body>
</html>
