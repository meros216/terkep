<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Monokróm 3D Erdő</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    // -----------------------------------------------------------
    // NE FELEJTSD EL VISSZAÍRNI A TOKENEDET!
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';
    // -----------------------------------------------------------

    const map = new mapboxgl.Map({
        container: 'map',
        // ITT VAN AZ ÚJ STÍLUSOD:
        style: 'mapbox://styles/meros2216/cmm50exbk00ac01r6fn6c8rd2',
        center: [19.877, 47.486], // Jászberény
        zoom: 16,
        pitch: 60,
        bearing: 30,
        antialias: true // Ez szebbé teszi a 3D éleket
    });

    map.on('style.load', () => {
        // --- A: Modell betöltése ---
        // Ha a konzolban 404-es hibát látsz, ellenőrizd a fájlnevet (kisbetű/nagybetű)!
        map.addModel('sajat-fa-modell', './fa.glb');

        // --- B: Pontok betöltése ---
        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        // --- C: Megjelenítés ---
        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                'model-scale': [8, 8, 8],     // Maradt a nagy méret
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0]
            }
        });

        // --- D: Fények (Hogy ne legyen koromsötét a fa) ---
        // Mivel ez saját stílus, adunk hozzá egy kis "környezeti fényt"
        if (!map.getLayer('sky')) {
            map.addLayer({
                'id': 'sky',
                'type': 'sky',
                'paint': {
                    'sky-type': 'atmosphere',
                    'sky-atmosphere-sun': [0.0, 0.0],
                    'sky-atmosphere-sun-intensity': 15
                }
            });
        }
    });
</script>
</body>
</html>
