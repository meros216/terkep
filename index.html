<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Árnyékos 3D Térkép (Javított)</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }

/* --- FEKETE-FEHÉR SZŰRŐ --- */
/* Ez teszi makett-szerűvé. Ha színesben akarod látni, töröld ki ezt a 3 sort! */
.mapboxgl-canvas {
    filter: grayscale(100%); 
}
</style>
</head>
<body>
<div id="map"></div>
<script>
    // --- 1. TOKEN ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';

    const map = new mapboxgl.Map({
        container: 'map',
        // CSAK EZ TUD VETETT ÁRNYÉKOT!
        style: 'mapbox://styles/mapbox/standard', 
        center: [19.877, 47.486],
        zoom: 16,
        pitch: 62,
        bearing: 30,
        antialias: true
    });

    map.on('style.load', () => {
        
        // 1. BEÁLLÍTÁSOK (Standard stílushoz)
        map.setConfig('basemap', {
            'showPointOfInterestLabels': false, // Boltok nevei KI
            'showTransitLabels': false,         // Buszmegállók KI
            'showRoadLabels': false,            // Utcanevek KI
            'showPlaceLabels': false,           // Városnevek KI
            'lightPreset': 'dawn'               // HAJNALI FÉNY (Hosszú árnyékok!)
        });

        // 2. KÖD ELTÜNTETÉSE
        map.setFog(null);

        // 3. FÁK BETÖLTÉSE
        // (Ha hibát dob a konzol, ellenőrizd, hogy 'fa.glb' a neve a GitHubon!)
        map.addModel('sajat-fa-modell', './fa.glb');

        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                // VISSZAÁLLÍTOTTAM NAGYRA!
                'model-scale': [1, 1, 1], 
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0]
            }
        });
    });
</script>
</body>
</html>
