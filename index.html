<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Árnyékos 3D Térkép</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }

/* --- EZ A TRÜKK! --- */
/* Ez a sor fekete-fehérre állítja az egész térképet a böngészőben. */
/* Ha színesben akarod látni, és majd Photoshopban módosítani, töröld ki a 'filter' sort! */
.mapboxgl-canvas {
    filter: grayscale(100%); 
}
</style>
</head>
<body>
<div id="map"></div>
<script>
    // --- 1. TOKEN ---
    mapboxgl.accessToken = 'pk.eyJ1IjoibWVyb3MyMjE2IiwiYSI6ImNtYWg3c2t3NjA4OHoyc3MzNmJpeW9qY3cifQ.kmg-gGygu1rGHh7VPeFOAQ';

    const map = new mapboxgl.Map({
        container: 'map',
        // VISSZATÉRÜNK A STANDARDHOZ (Mert csak ebben van vetett árnyék!)
        style: 'mapbox://styles/mapbox/standard', 
        center: [19.877, 47.486],
        zoom: 16,
        pitch: 62,
        bearing: 30,
        antialias: true
    });

    // Itt állítjuk be a "Standard" stílus extráit
    map.on('style.load', () => {
        
        // 1. FELIRATOK ELTÜNTETÉSE (Configgal sokkal egyszerűbb itt!)
        map.setConfig('basemap', {
            'showPointOfInterestLabels': false, // Boltok nevei
            'showTransitLabels': false,         // Buszmegállók
            'showRoadLabels': false,            // Utcanevek
            'showPlaceLabels': false,           // Városnevek
            'lightPreset': 'dawn'               // 'dawn' (hajnal) = Hosszú, drámai árnyékok!
                                                // Próbáld ki: 'day', 'dusk', 'night'
        });

        // 2. FÁK BETÖLTÉSE
        map.addModel('sajat-fa-modell', './fa.glb');

        map.addSource('fa-pontok', {
            'type': 'geojson',
            'data': './fak.geojson'
        });

        map.addLayer({
            'id': 'fak-retege',
            'type': 'model',
            'source': 'fa-pontok',
            'layout': {
                'model-id': 'sajat-fa-modell'
            },
            'paint': {
                // Mivel a Standard stílusnak saját fényei vannak, 
                // a fák automatikusan árnyékot fognak vetni!
                'model-scale': [0.005, 0.005, 0.005], 
                'model-rotation': [0, 0, 0],
                'model-translation': [0, 0, 0]
            }
        });
    });
</script>
</body>
</html>
